name: NeuralScholar CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create test .env
        run: |
          cat > .env << EOF
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          PINECONE_API_KEY=${{ secrets.PINECONE_API_KEY }}
          PINECONE_INDEX_NAME=neuralscholar-test
          PINECONE_DIMENSION=384
          LOCAL_EMBEDDING_MODEL=all-MiniLM-L6-v2
          LOCAL_EMBEDDING_DIM=384
          REDIS_HOST=localhost
          REDIS_PORT=6379
          OPENAI_CHAT_MODEL=gpt-4o-mini
          HYDE_ENABLED=false
          EOF

      - name: Run unit tests
        run: pytest tests/ -v --tb=short -x --ignore=tests/test_api.py

      - name: Run API integration tests
        run: pytest tests/test_api.py -v --tb=short
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t neuralscholar:${{ github.sha }} .

      - name: Test Docker health
        run: |
          docker run -d \
            --name test-api \
            -e OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }} \
            -e PINECONE_API_KEY=${{ secrets.PINECONE_API_KEY }} \
            -p 8000:8000 \
            neuralscholar:${{ github.sha }}
          sleep 30
          curl -f http://localhost:8000/health || exit 1
          docker stop test-api